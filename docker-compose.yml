version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: vk_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: vk
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
