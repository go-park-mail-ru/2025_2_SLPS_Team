name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [myapp, myapp-elasticsearch]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set build context and Dockerfile
        run: |
          case "${{ matrix.image }}" in
            myapp)
              echo "DOCKERFILE=Dockerfile" >> $GITHUB_ENV
              echo "BUILD_CONTEXT=." >> $GITHUB_ENV
              ;;
            myapp-elasticsearch)
              echo "DOCKERFILE=Dockerfile.elasticsearch" >> $GITHUB_ENV
              echo "BUILD_CONTEXT=." >> $GITHUB_ENV
              ;;
            *)
              echo "Unknown image: ${{ matrix.image }}"
              exit 1
              ;;
          esac

      - name: Build Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}
          docker build -f $DOCKERFILE -t $IMAGE_NAME:latest --cache-from $IMAGE_NAME:latest $BUILD_CONTEXT

      - name: Push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}
          docker push $IMAGE_NAME:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.4
        with:
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USER }}
            key: ${{ secrets.SSH_KEY }}
            source: "docker-compose.yml"
            target: "/home/ubuntu/myapp/"
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
            mkdir -p /home/ubuntu/myapp
            
            printf '%s\n' "${{ secrets.ENV_FILE }}" > /home/ubuntu/myapp/.env
            echo "APP_IMAGE=${{ secrets.DOCKER_USERNAME }}/myapp:latest" >> /home/ubuntu/myapp/.env
            echo "ELASTIC_IMAGE=${{ secrets.DOCKER_USERNAME }}/myapp-elasticsearch:latest" >> /home/ubuntu/myapp/.env 
            cd /home/ubuntu/myapp
            
            docker-compose down -v || true
            
            docker-compose pull
            
            docker-compose --env-file .env up -d
