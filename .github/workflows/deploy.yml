name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t mydockerhubuser/myapp:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker tag mydockerhubuser/myapp:${{ github.sha }} mydockerhubuser/myapp:latest
          docker push mydockerhubuser/myapp:${{ github.sha }}
          docker push mydockerhubuser/myapp:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/myapp

            printf '%s\n' "${{ secrets.ENV_FILE }}" > /home/ubuntu/myapp/.env

            docker stop myapp || true
            docker rm myapp || true

            docker pull mydockerhubuser/myapp:latest

            docker run -d --env-file /home/ubuntu/myapp/.env \
              --name myapp -p 8080:8080 mydockerhubuser/myapp:latest
