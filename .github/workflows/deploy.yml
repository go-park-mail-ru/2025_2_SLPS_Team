name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [main, auth, friend, profile, migrations, myapp-elasticsearch, nginx]
      max-parallel: 3  # ограничиваем параллельность для безопасности

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set build args
        run: |
          echo "SERVICE=${{ matrix.image }}" >> $GITHUB_ENV
          BUILD_DOCKERFILE="Dockerfile"
          case "${{ matrix.image }}" in
            myapp-elasticsearch) BUILD_DOCKERFILE="Dockerfile.elasticsearch" ;;
            nginx) BUILD_DOCKERFILE="Dockerfile.nginx" ;;
            migrations) BUILD_DOCKERFILE="Dockerfile.migrations" ;;
          esac
          echo "DOCKERFILE=$BUILD_DOCKERFILE" >> $GITHUB_ENV
          echo "BUILD_CONTEXT=." >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}" >> $GITHUB_ENV

      - name: Pull cache if exists
        run: |
          docker pull $IMAGE_NAME:latest || true

      - name: Build Docker image with cache
        run: |
          docker buildx build \
            -f $DOCKERFILE \
            -t $IMAGE_NAME:latest \
            --cache-from $IMAGE_NAME:latest \
            --cache-to=type=inline \
            $BUILD_CONTEXT \
            --build-arg SERVICE=${{ matrix.image }}

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/myapp/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker login ghcr.io -u "${{ github.repository_owner }}" -p "${{ secrets.GITHUB_TOKEN }}"
            mkdir -p /home/ubuntu/myapp
            printf '%s\n' "${{ secrets.ENV_FILE }}" > /home/ubuntu/myapp/.env
            cd /home/ubuntu/myapp
            docker-compose down -v || true
            docker-compose pull
            docker-compose --env-file .env up -d
            docker image prune -f
