basePath: /api/
definitions:
  domain.Application:
    properties:
      authorID:
        type: string
      category:
        example: app_freezing
        type: string
      createdAt:
        example: "1990-01-01T00:00:00Z"
        type: string
      emailFeedBack:
        type: string
      emailReg:
        type: string
      fullName:
        type: string
      id:
        type: integer
      status:
        example: open
        type: string
      text:
        type: string
      updatedAt:
        example: "1990-01-01T00:00:00Z"
        type: string
    type: object
  domain.FriendsCountResponse:
    properties:
      count:
        type: integer
      countType:
        $ref: '#/definitions/domain.FriendshipCountType'
      userID:
        type: integer
    type: object
  domain.FriendshipCountType:
    enum:
    - pending
    - accepted
    - rejected
    - blocked
    - sent
    type: string
    x-enum-varnames:
    - CountPending
    - CountAccepted
    - CountRejected
    - CountBlocked
    - CountSent
  domain.FriendshipStatus:
    enum:
    - pending
    - accepted
    - rejected
    - blocked
    - none
    type: string
    x-enum-varnames:
    - FriendshipPending
    - FriendshipAccepted
    - FriendshipRejected
    - FriendshipBlocked
    - FriendshipNone
  domain.FullChat:
    properties:
      avatarPath:
        type: string
      id:
        type: integer
      isGroup:
        type: boolean
      lastMessage:
        $ref: '#/definitions/domain.Message'
      lastMessageAuthor:
        $ref: '#/definitions/domain.ShortProfile'
      name:
        type: string
    type: object
  domain.Message:
    properties:
      authorID:
        type: integer
      chatID:
        type: integer
      createdAt:
        type: string
      id:
        type: integer
      text:
        type: string
    type: object
  domain.MessagesWithAuthors:
    properties:
      authors:
        additionalProperties:
          $ref: '#/definitions/domain.ShortProfile'
        type: object
      messages:
        items:
          $ref: '#/definitions/domain.Message'
        type: array
    type: object
  domain.Post:
    properties:
      attachments:
        description: в БД табличка post_attachments называется
        items:
          type: string
        type: array
      authorID:
        description: в БД табличка posts называется
        type: integer
      created_at:
        description: в БД табличка posts называется
        type: string
      id:
        description: в БД табличка posts называется
        type: integer
      photos:
        description: в БД табличка post_photos называется
        items:
          type: string
        type: array
      text:
        description: в БД табличка posts называется
        type: string
      updated_at:
        description: в БД табличка posts называется
        type: string
    type: object
  domain.Profile:
    properties:
      aboutMyself:
        type: string
      avatarPath:
        type: string
      dob:
        type: string
      firstName:
        type: string
      gender:
        type: string
      headerPath:
        type: string
      lastName:
        type: string
      userID:
        type: integer
    type: object
  domain.RegisterRequest:
    properties:
      confirmPassword:
        example: "123123"
        type: string
      dob:
        example: "1990-01-01T00:00:00Z"
        type: string
      email:
        example: example@example.ru
        type: string
      firstName:
        type: string
      gender:
        type: string
      lastName:
        type: string
      password:
        example: "123123"
        type: string
    type: object
  domain.ShortProfile:
    properties:
      avatarPath:
        type: string
      fullName:
        type: string
      userID:
        type: integer
    type: object
  domain.ShortProfileAndDOB:
    properties:
      avatarPath:
        type: string
      dob:
        type: string
      fullName:
        type: string
      userID:
        type: integer
    type: object
  domain.ShortProfileWithStatusAndDOB:
    properties:
      avatarPath:
        type: string
      dob:
        type: string
      fullName:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/domain.FriendshipStatus'
        description: Указатель
      userID:
        type: integer
    type: object
  domain.User:
    properties:
      email:
        type: string
      id:
        type: integer
      password:
        type: string
      role:
        type: string
    type: object
  handler.ApplicationIDResponse:
    properties:
      applicationID:
        type: integer
    type: object
  handler.ChatIDResponse:
    properties:
      chatID:
        type: integer
    type: object
  handler.FriendshipStatusResponse:
    description: Ответ с текущим статусом дружбы между пользователями
    properties:
      status:
        allOf:
        - $ref: '#/definitions/domain.FriendshipStatus'
        description: Статус дружбы
        enum:
        - pending
        - accepted
        - rejected
        - blocked
        example: pending
    type: object
  handler.IsLoggedInResponse:
    properties:
      userID:
        type: integer
    type: object
  handler.JSONResponse:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  handler.MessageIDResponse:
    properties:
      messageID:
        type: integer
    type: object
  handler.PostsResponse:
    description: Ответ с пагинированным списком постов
    properties:
      posts:
        description: Список постов
        items:
          $ref: '#/definitions/domain.Post'
        type: array
    type: object
  handler.updateStatusRequest:
    properties:
      status:
        type: string
    type: object
  handler.updateTextRequest:
    properties:
      text:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a VK API.
  termsOfService: http://swagger.io/terms/
  title: VK API
  version: "1.0"
paths:
  /applications:
    get:
      consumes:
      - application/json
      description: Returns paginated list of applications. Admins see all, normal
        users see only theirs.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Application'
            type: array
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: List support applications
      tags:
      - Applications
    post:
      consumes:
      - application/json
      description: Creates a new support application. Can be created by a registered
        user or a temp session.
      parameters:
      - description: Application payload
        in: body
        name: application
        required: true
        schema:
          $ref: '#/definitions/domain.Application'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ApplicationIDResponse'
        "400":
          description: Invalid JSON or missing fields
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Create a new support application
      tags:
      - Applications
  /applications/{id}/status:
    put:
      consumes:
      - application/json
      description: Updates the status of an existing support application by ID.
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: integer
      - description: New status
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/handler.updateStatusRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID or request body
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Update the status of an application
      tags:
      - Applications
  /applications/{id}/text:
    put:
      consumes:
      - application/json
      description: Updates the text of an existing support application by ID.
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: integer
      - description: New text
        in: body
        name: text
        required: true
        schema:
          $ref: '#/definitions/handler.updateTextRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID or request body
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Update the text of an application
      tags:
      - Applications
  /auth/isloggedin:
    get:
      description: Возвращает ID пользователя, если сессия валидна
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь авторизован
          schema:
            $ref: '#/definitions/handler.IsLoggedInResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Проверить авторизацию пользователя
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Логин с email и паролем, возвращает cookie сессии
      parameters:
      - description: Данные для входа
        in: body
        name: loginRequest
        required: true
        schema:
          $ref: '#/definitions/domain.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Авторизация пользователя
      tags:
      - auth
  /auth/logout:
    post:
      description: Удаляет cookie сессии, разлогинивает пользователя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Выход пользователя
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя с профилем и устанавливает сессию
      parameters:
      - description: Данные для регистрации
        in: body
        name: registerRequest
        required: true
        schema:
          $ref: '#/definitions/domain.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Регистрация пользователя
      tags:
      - auth
  /chats:
    get:
      consumes:
      - application/json
      description: Возвращает постраничный список чатов для текущего (аутентифицированного)
        пользователя.
      parameters:
      - default: 20
        description: Количество чатов для возврата
        in: query
        name: limit
        type: integer
      - default: 0
        description: Номер страницы для пагинации
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список чатов
          schema:
            items:
              $ref: '#/definitions/domain.FullChat'
            type: array
        "400":
          description: Некорректные параметры запроса
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Получить список чатов пользователя
      tags:
      - chats
  /chats/{chatID}/message:
    post:
      consumes:
      - application/json
      description: Создает новое сообщение в указанном чате
      parameters:
      - description: ID чата
        in: path
        name: chatID
        required: true
        type: integer
      - description: Тело сообщения
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/domain.Message'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MessageIDResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Создать сообщение
      tags:
      - messages
  /chats/{id}/messages:
    get:
      description: Возвращает сообщения из чата с пагинацией и краткую информацию
        об авторах
      parameters:
      - description: ID чата
        in: path
        name: id
        required: true
        type: integer
      - default: 20
        description: Лимит количества сообщений
        in: query
        name: limit
        type: integer
      - default: 0
        description: страница для пагинации
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.MessagesWithAuthors'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Получить сообщения чата с авторами
      tags:
      - messages
  /chats/user/{id}:
    get:
      consumes:
      - application/json
      description: Возвращает ID чата между текущим пользователем и указанным userID,
        создавая чат при отсутствии
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ChatIDResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      summary: Получить или создать чат с пользователем
      tags:
      - chats
  /friends:
    get:
      description: Возвращает список друзей пользователя с пагинацией
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Количество друзей на странице
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ со списком друзей
          schema:
            items:
              $ref: '#/definitions/domain.ShortProfileAndDOB'
            type: array
        "400":
          description: Неверные параметры пагинации
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      security:
      - ApiKeyAuth: []
      summary: Получить список друзей
      tags:
      - friends
  /friends/{id}:
    delete:
      consumes:
      - application/json
      description: Удаляет пользователя из списка друзей
      parameters:
      - description: ID пользователя
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь успешно удален из друзей
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "400":
          description: Неверный ID пользователя
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "404":
          description: Пользователи не являются друзьями
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      security:
      - ApiKeyAuth: []
      summary: Удалить из друзей
      tags:
      - friends
    post:
      consumes:
      - application/json
      description: Отправляет запрос на дружбу другому пользователю
      parameters:
      - description: ID пользователя, которому отправляется запрос
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Запрос успешно отправлен
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "400":
          description: Неверный ID пользователя или попытка добавить самого себя
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "409":
          description: Запрос уже существует или пользователи уже друзья
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      security:
      - ApiKeyAuth: []
      summary: Отправить запрос в друзья
      tags:
      - friends
  /friends/{id}/accept:
    put:
      consumes:
      - application/json
      description: Принимает входящий запрос на дружбу
      parameters:
      - description: ID пользователя (отправителя запроса)
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Запрос успешно принят
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "400":
          description: Неверный ID пользователя
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "404":
          description: Запрос не найден
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      security:
      - ApiKeyAuth: []
      summary: Принять запрос в друзья
      tags:
      - friends
  /friends/{id}/count:
    get:
      description: Возвращает количество отношений указанного пользователя по типу
        отношений
      parameters:
      - description: ID пользователя
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      - default: accepted
        description: 'Тип подсчета: accepted, pending, sent, blocked'
        enum:
        - accepted
        - pending
        - sent
        - blocked
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ с количеством отношений
          schema:
            $ref: '#/definitions/domain.FriendsCountResponse'
        "400":
          description: Неверный ID пользователя или тип подсчета
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      security:
      - ApiKeyAuth: []
      summary: Получить количество отношений
      tags:
      - friends
  /friends/{id}/reject:
    put:
      consumes:
      - application/json
      description: Отклоняет входящий запрос на дружбу
      parameters:
      - description: ID пользователя (отправителя запроса)
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Запрос успешно отклонен
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "400":
          description: Неверный ID пользователя
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "404":
          description: Запрос не найден
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      security:
      - ApiKeyAuth: []
      summary: Отклонить запрос в друзья
      tags:
      - friends
  /friends/{id}/status:
    get:
      description: Возвращает текущий статус дружбы с указанным пользователем
      parameters:
      - description: ID пользователя
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ со статусом дружбы
          schema:
            $ref: '#/definitions/handler.FriendshipStatusResponse'
        "400":
          description: Неверный ID пользователя
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      security:
      - ApiKeyAuth: []
      summary: Получить статус дружбы
      tags:
      - friends
  /friends/requests:
    get:
      description: Возвращает список входящих запросов на дружбу с пагинацией
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Количество запросов на странице
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ со списком запросов
          schema:
            items:
              $ref: '#/definitions/domain.ShortProfileAndDOB'
            type: array
        "400":
          description: Неверные параметры пагинации
          schema:
            $ref: '#/definitions/handler.JSONResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/handler.JSONResponse'
      security:
      - ApiKeyAuth: []
