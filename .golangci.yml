version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - bodyclose
    - contextcheck
    - errcheck
    - asciicheck
    - copyloopvar
    - decorder
    - goconst
    - prealloc
    - unparam
    - unused
    - unconvert
    - gocritic
    - gocyclo
    - ineffassign
    - nakedret
    - errorlint
    - err113

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: false
      print-linter-name: false
